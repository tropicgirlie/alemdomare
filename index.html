<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="content-kit.jsx?v=20260523"></script>
  <script type="text/babel" src="atoms.jsx?v=20260601"></script>

  <script type="text/babel" src="tool-runner.jsx?v=20260523"></script>
  <script type="text/babel" src="tool-results.jsx?v=20260523"></script>
  <script type="text/babel" src="tool-picker.jsx?v=20260531"></script>
  <script type="text/babel" src="landing.jsx?v=20260601"></script>
  <script type="text/babel" src="translator.jsx?v=20260601"></script>
  <script type="text/babel" src="paywall.jsx?v=20260523"></script>
  <script type="text/babel" src="reviewers.jsx?v=20260601"></script>
  <script type="text/babel" src="sobre.jsx?v=20260601"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "direction": "a",
      "showSwitcher": false
    }/*EDITMODE-END*/;

    const HASH_TO_PAGE = { '#sobre': 'sobre', '#reviewers': 'reviewers' };
    const PAGE_TO_HASH = { sobre: '#sobre', reviewers: '#reviewers' };

    function pageFromHash() {
      return HASH_TO_PAGE[window.location.hash] || 'landing';
    }

    function syncHashForPage(page) {
      const want = PAGE_TO_HASH[page] || '';
      if (window.location.hash === want) return;
      const base = window.location.pathname + window.location.search;
      history.replaceState(null, '', want ? base + want : base);
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPageState] = React.useState(pageFromHash);
      const setPage = React.useCallback((next) => {
        setPageState(next);
        syncHashForPage(next);
      }, []);
      const [openItem, setOpenItem] = React.useState(null);
      const [startMode, setStartMode] = React.useState('career');
      const [paywall, setPaywall] = React.useState({ open: false, reason: 'add' });
      const [privacyOpen, setPrivacyOpen] = React.useState(false);
      const [isOwnerMode, setIsOwnerMode] = React.useState(false);

      // Expose paywall opener globally so deep components can trigger it.
      React.useEffect(() => {
        window.AdM_openPaywall = (reason) => setPaywall({ open: true, reason: reason || 'add' });
        try { localStorage.removeItem('adm-history'); } catch (e) { /* noop */ }
        return () => { delete window.AdM_openPaywall; };
      }, []);

      // Handle Stripe return + privacy event
      React.useEffect(() => {
        (async () => {
          if (!window.AdM_CREDITS) return;
          const granted = await window.AdM_CREDITS.handleStripeReturn();
          if (granted) {
            setPaywall({ open: false, reason: 'add' });
          }
        })();
      }, []);

      // Handle privacy open event
      React.useEffect(() => {
        const handlePrivacy = () => setPrivacyOpen(true);
        window.addEventListener('adm_open_privacy', handlePrivacy);
        return () => window.removeEventListener('adm_open_privacy', handlePrivacy);
      }, []);

      React.useEffect(() => {
        const onHashChange = () => {
          const next = pageFromHash();
          setPageState(next);
        };
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      // Handle shared links
      React.useEffect(() => {
        const share = new URLSearchParams(window.location.search).get('share');
        if (share) {
          try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(share))));
            setOpenItem({ result: decoded.result, form: decoded.form });
            setPage('translator');
          } catch (e) { console.warn('bad share link', e); }
        }
      }, []);

      const direction = tweaks.direction || 'a';

      const shellClass = direction === 'a' ? 'dir-a' : 'dir-b';

      return (
        <div className={shellClass}>
          {tweaks.showSwitcher && (
            <div className="dir-switch">
              <button
                className={direction === 'a' ? 'active' : ''}
                onClick={() => setTweak('direction', 'a')}
              >A · Editorial</button>
              <button
                className={direction === 'b' ? 'active' : ''}
                onClick={() => setTweak('direction', 'b')}
              >B · Marítimo</button>
            </div>
          )}

          {page === 'landing' && (
            <Landing
              direction={direction}
              onStart={() => { setOpenItem(null); setStartMode('career'); setPage('translator'); }}
              onStartCultural={() => { setOpenItem(null); setStartMode('cultural'); setPage('translator'); }}
              onStartTool={(id) => { setOpenItem(null); setStartMode(id); setPage('translator'); }}
              onShowReviewers={() => setPage('reviewers')}
              onShowSobre={() => setPage('sobre')}
            />
          )}
          {page === 'translator' && (
            <TranslatorView
              direction={direction}
              initialResult={openItem?.result}
              initialForm={openItem?.form}
              initialTone={openItem?.tone}
              initialMode={startMode}
              onBack={() => setPage('landing')}
            />
          )}
          {page === 'reviewers' && (
            <Reviewers
              direction={direction}
              onBack={() => setPage('landing')}
            />
          )}
          {page === 'sobre' && (
            <Sobre
              direction={direction}
              onBack={() => setPage('landing')}
            />
          )}

          <TweaksPanel title="Tweaks">
            <TweakSection label="Visual direction" />
            <TweakRadio
              label="Direction"
              value={tweaks.direction}
              onChange={(v) => setTweak('direction', v)}
              options={[
                { value: 'a', label: 'Editorial' },
                { value: 'b', label: 'Marítimo' },
              ]}
            />
            <TweakToggle
              label="Top switcher"
              value={tweaks.showSwitcher}
              onChange={(v) => setTweak('showSwitcher', v)}
            />
            <ContentEditorPanel />
            <TweakSection label="Owner Mode" />
            <TweakToggle
              label="👑 Owner Mode (Unlimited Access)"
              value={isOwnerMode}
              onChange={(v) => {
                setIsOwnerMode(v);
                if (v) {
                  // Give unlimited credits when owner mode is enabled
                  window.AdM_CREDITS.addCredits(999, 'owner');
                }
              }}
            />
            {isOwnerMode && (
              <div style={{ 
                fontSize: 12, 
                color: direction === 'a' ? '#2a9d8f' : '#4fb9b8', 
                marginTop: 8,
                padding: '8px 12px',
                background: direction === 'a' ? 'rgba(42,157,143,0.1)' : 'rgba(79,185,184,0.1)',
                borderRadius: 6,
                border: `1px solid ${direction === 'a' ? 'rgba(42,157,143,0.3)' : 'rgba(79,185,184,0.3)'}`
              }}>
                ✨ Owner Mode Active · Unlimited access to all tools
              </div>
            )}
            <TweakSection label="Pular para" />
            <TweakButton label="→ Landing" onClick={() => setPage('landing')} />
            <TweakButton label="→ Tradutor" onClick={() => { setOpenItem(null); setPage('translator'); }} />
            <TweakButton label="→ Sobre" onClick={() => setPage('sobre')} />
            {!isOwnerMode && (
              <>
                <TweakSection label="Créditos (dev)" />
                <TweakButton label="Abrir paywall" onClick={() => setPaywall({ open: true, reason: 'add' })} />
                <TweakButton label="+5 créditos (dev)" onClick={() => window.AdM_CREDITS.addCredits(5, 'dev')} />
                <TweakButton label="Reset créditos" onClick={() => { window.AdM_CREDITS.deleteAllData(); }} />
              </>
            )}
          </TweaksPanel>

          {!isOwnerMode && (
            <PaywallModal
              direction={direction}
              open={paywall.open}
              reason={paywall.reason}
              onClose={() => setPaywall({ open: false, reason: 'add' })}
            />
          )}
          <PrivacyModal
            direction={direction}
            open={privacyOpen}
            onClose={() => setPrivacyOpen(false)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ContentProvider>
        <App />
      </ContentProvider>
    );
  </script>
</body>
