name = "alemdomar-auth"
main = "worker.js"
compatibility_date = "2023-10-30"

# KV Namespaces for authentication
[[kv_namespaces]]
binding = "ADM_USERS"
id = "bbff88255b514739ac9485b2109866a2"

[[kv_namespaces]]
binding = "ADM_HISTORY"
id = "5aedcf2dda8842799ca9b4bc110a1ccf"

# DO NOT put OPENAI_API_KEY or STRIPE_SECRET_KEY here. Set them as secrets:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
# A previous OpenAI key was committed to Git history and MUST be rotated.
[vars]
# CLAUDE_API_KEY = "your-claude-api-key"
